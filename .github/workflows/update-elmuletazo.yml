name: Actualizar El Muletazo

on:
  workflow_dispatch:
  schedule:
    - cron: "20 5,11,17,23 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ejecutar extractor de El Muletazo
        run: node scrapers/elmuletazo.mjs

      - name: Guardar cambios
        run: |
          git config user.name "alberotv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/elmuletazo.json
          git diff --cached --quiet && exit 0
          git commit -m "Actualizar programación El Muletazo"
          git push
