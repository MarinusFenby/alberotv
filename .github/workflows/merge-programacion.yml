name: Fusionar programación

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fusionar fuentes
        run: node scrapers/merge.mjs

      - name: Guardar programación
        run: |
          git config user.name "alberotv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/programacion.json
          git diff --cached --quiet && exit 0
          git commit -m "Actualizar programación fusionada"
          git push
