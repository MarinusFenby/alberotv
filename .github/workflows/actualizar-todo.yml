name: Actualizar toda la programación

on:
  workflow_dispatch:

  schedule:
    - cron: "25 5,11,17,23 * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-programacion
  cancel-in-progress: false


jobs:

  update:
    runs-on: ubuntu-latest


    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4


      - name: Preparar Node
        uses: actions/setup-node@v4

        with:
          node-version: "22"


      - name: Actualizar OneToro
        run: |
          node scrapers/onetoro.mjs


      - name: Actualizar El Muletazo
        run: |
          node scrapers/elmuletazo.mjs


      - name: Fusionar programación
        run: |
          node scrapers/merge.mjs


      - name: Comprobar archivos generados
        run: |
          echo "=== OneToro ==="
          test -f data/onetoro.json

          echo "=== El Muletazo ==="
          test -f data/elmuletazo.json

          echo "=== Programación fusionada ==="
          test -f data/programacion.json

          echo "Todos los archivos existen correctamente."


      - name: Guardar cambios
        run: |

          git config user.name "alberotv-bot"

          git config user.email "actions@users.noreply.github.com"


          git add \
            data/onetoro.json \
            data/elmuletazo.json \
            data/programacion.json


          if git diff --cached --quiet
          then

            echo "No hay cambios nuevos en la programación."

            exit 0

          fi


          git commit \
            -m "Actualizar programación AlberoTV"


          git push
