name: Actualizar OneToro

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5,11,17,23 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Extraer programación de OneToro
        run: npm run scrape:onetoro

      - name: Guardar cambios
        run: |
          git config user.name "alberotv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/onetoro.json
          git diff --cached --quiet && exit 0
          git commit -m "Actualizar programación OneToro"
          git push
